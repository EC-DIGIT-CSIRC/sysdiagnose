# Enforce our house Python style.

# In addition to the standard set of exclusions, omit auto-generated files.
extend-exclude = ["migrations"]

# PEP 8 dictates a preferred maximum line length of <= 79.
# LATER: To be discussed. For now, this minimises the diff.
line-length = 180

# We use rules from:
# E = Style errors from pycodestyle (PEP8)
# F = Logic and syntax errors from pyflakes
# B = flake8-bugbear - find bugs and design problems
# I = import sort order
# UP  = pyupgrade - use latest python syntax
# ANN = require type annotations
# SIM = flake8-simplify - make code more concise and readable
# T20 = flake8-print - disallow print statements (use logging instead)

lint.select = ["E", "F", "B", "I", "UP", "SIM", "T20"]
# TODO: add ANN to the list

[lint.per-file-ignores]
"src/sysdiagnose/__main__.py" = ["T20"]
"tests/*" = ["E501", "T201"]