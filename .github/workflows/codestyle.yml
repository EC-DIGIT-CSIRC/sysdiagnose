name: Code Style Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint
        uses: astral-sh/ruff-action@v3

      - name: Check formatting
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
